name: Build and release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: build-release
  cancel-in-progress: false

jobs:
  # 1) 버전 계산 (+ main 푸시면 태그 생성)
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            CREATE_TAG=false
          else
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
            LATEST=${LATEST:-v0.0.0}
            IFS=. read -r MA MI PA <<< "${LATEST#v}"
            VERSION="$MA.$MI.$((PA+1))"
            CREATE_TAG=true
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "▶ version $VERSION"

      - name: Create version tag
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"

  # 2) Windows 클라이언트 .exe 빌드 → 릴리스 첨부 + 아티팩트로 전달
  windows:
    needs: version
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pyinstaller pystray pillow customtkinter
      - name: Build exe
        working-directory: win_x64
        run: python -m PyInstaller --noconfirm --clean gendisk-sync.spec
      - name: Rename with version
        working-directory: win_x64/dist
        shell: bash
        run: mv gendisk-sync.exe "gendisk-sync-${{ needs.version.outputs.version }}.exe"
      - name: Upload artifact (docker 이미지에 포함시킬 exe)
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: win_x64/dist/gendisk-sync-*.exe
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: genDISK v${{ needs.version.outputs.version }}
          body: |
            genDISK ${{ needs.version.outputs.version }}

            - 서버 이미지: `ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}`
            - Windows 클라이언트: 아래 `gendisk-sync-*.exe` (파이썬 불필요). 웹 UI의 "Windows 앱" 버튼으로도 받을 수 있습니다.
          files: win_x64/dist/gendisk-sync-*.exe
          fail_on_unmatched_files: true

  # 3) 서버 도커 이미지 빌드 (exe를 downloads/에 포함해 웹 UI에서 다운로드 가능)
  docker:
    needs: [version, windows]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows exe into build context
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: downloads

      - name: Compute image tags
        id: tags
        run: |
          REPO="ghcr.io/${{ github.repository }}"
          V="${{ needs.version.outputs.version }}"
          echo "tags=$REPO:$V,$REPO:latest,$REPO:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
